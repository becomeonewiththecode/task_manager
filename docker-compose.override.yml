version: '3.9'

services:
  frontend:
    build:
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    ports:
      - '3333:3333'
    environment:
      - BACKEND_URL=http://backend:4000

  backend:
    build:
      target: development
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npx prisma db push --skip-generate && npm run dev"
    environment:
      - NODE_ENV=development
