<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="#4f46e5"/>
  <!-- Three task lines with check/dot indicators -->
  <!-- Top task: checked (checkmark) -->
  <circle cx="8" cy="10" r="3" fill="#a5b4fc"/>
  <polyline points="6.5,10 7.5,11.2 9.5,8.8" stroke="#4f46e5" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="13" y="9" width="11" height="2" rx="1" fill="#c7d2fe"/>
  <!-- Middle task: checked -->
  <circle cx="8" cy="16" r="3" fill="#a5b4fc"/>
  <polyline points="6.5,16 7.5,17.2 9.5,14.8" stroke="#4f46e5" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="13" y="15" width="9" height="2" rx="1" fill="#c7d2fe"/>
  <!-- Bottom task: pending (empty circle) -->
  <circle cx="8" cy="22" r="3" fill="none" stroke="#818cf8" stroke-width="1.5"/>
  <rect x="13" y="21" width="12" height="2" rx="1" fill="#818cf8"/>
</svg>
